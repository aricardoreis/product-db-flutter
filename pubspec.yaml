name: product_db_flutter
description: "Flutter mobile client for the Product DB ecosystem (NF-e price tracking)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.3
  intl: ^0.20.0
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - .env
